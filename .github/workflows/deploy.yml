name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow re-running by hand without pushing.
  workflow_dispatch:

# One in-flight deploy at a time; cancel in-progress runs when a new
# commit lands so we don't ship stale builds.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test --run

      - name: Build
        # `BASE_PATH` matches the GitHub Pages project URL
        # (`https://<user>.github.io/workout-tracker/`). Vite picks it
        # up via vite.config.ts and rewrites all asset URLs to match.
        env:
          BASE_PATH: /workout-tracker/
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
